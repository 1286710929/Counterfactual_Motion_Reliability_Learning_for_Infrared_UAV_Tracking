# CMRTrack-V166: V161 trained on Anti-UAV410 train2.
# Base: V161 target-erased counterfactual history with global-mean fill.
# Only DATA.TRAIN.DATASETS_NAME is changed from AntiUAV410 to AntiUAV410Train2.
DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  SEARCH:
    CENTER_JITTER: 4.5
    FACTOR: 6.0
    SCALE_JITTER: 0.5
    SIZE: 256
    NUMBER: 2
    RANDOM_JITTER_RATIO: 0.2
    RANDOM_CENTER_JITTER: 0
    RANDOM_SCALE_JITTER: 0.1
  STD:
  - 0.229
  - 0.224
  - 0.225
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
  TRAIN:
    DATASETS_NAME:
    - AntiUAV410Train2
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 85715
    POS_PROB: 0.7
  VAL:
    DATASETS_NAME:
    - AntiUAV410
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 10000
MODEL:
  PRETRAIN_FILE: "dropmae_pretrained_vit-B-16_k700_800E.pth"
  BACKBONE:
    TYPE: vit_base_patch16_224
    STRIDE: 16
    ADD_CLS_TOKEN: False
    OUT_INDICES: []
  DECODER:
    ADD_DECODER: False
  HEAD:
    BOX_HEAD:
      TYPE: CENTER
      NUM_CHANNELS: 256
    CLS_HEAD:
      USE_CLS_TOKEN: False
      NUM_CLASSES: 2
  MOTION:
    ENABLE: True
    VERSION: v1
    HISTORY_LEN: 1
    HIDDEN_DIM: 16
    TOKEN_GATE: True
    TOKEN_GATE_ALPHA: 0.5
    PROMPT_ENABLE: False
    PROMPT_NUM: 4
    SCORE_FUSION: True
    SCORE_FUSION_ALPHA: 0.5
    SCORE_FUSION_RESIDUAL_SCALE: 0.5
    SCORE_FUSION_RELIABILITY: True
    COUNTERFACTUAL_ENABLE: True
    COUNTERFACTUAL_MODE: erase_target_mean
TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  BATCH_SIZE: 64
  EPOCH: 30
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 5.0
  FOCALLOSS_WEIGHT: 1.0
  MOTION_WEIGHT: 0.3
  FUSION_WEIGHT: 0.3
  FUSION_BETA: 0.5
  MOTION_CF_WEIGHT: 0.05
  MOTION_CF_BG_WEIGHT: 0.03
  MOTION_CF_REL_WEIGHT: 0.03
  MOTION_CF_MARGIN: 0.12
  MOTION_CF_REL_TEMP: 0.25
  CE_WEIGHT: 0.0
  FOCALMASK_WEIGHT: 0.0
  GRAD_CLIP_NORM: 0.1
  LR: 0.0004
  LR_DROP_EPOCH: 24
  NUM_WORKER: 4
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: CosineAnnealingLR
  VAL_EPOCH_INTERVAL: 5
  FINAL_VAL_EPOCHS: 5
  TEST_AFTER_VAL: True
  TEST_DATASET_NAME: antiuav410_test
  TEST_THREADS: 6
  TEST_NUM_GPUS: 1
  TEST_SKIP_MISSING_SEQ: False
  WEIGHT_DECAY: 0.0001
  AMP: False
  SAVE_INTERVAL: 10
  EXTRA_SAVE_EPOTH: [29, 30]
  TRAIN_SECOND_STAGE: False
TEST:
  EPOCH: 30
  USE_REGION_ADJUST: False
  MOTION_VERIFY: True
  MOTION_VERIFY_ALPHA: 0.5
  TEMPLATE:
    FACTOR: 2.0
    SIZE: 128
  SEARCH:
    FACTOR: 6.0
    SIZE: 256
